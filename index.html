
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Racing Kings Study Converter</title>

  <link rel="stylesheet" href="style.css"/>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pgn-parser@2.2.1/dist/pgn-parser.min.js"></script>
</head>
<body>

<div class="container">

  <h1>Racing Kings Study Converter</h1>

  <p class="subtitle">
    Convert Lichess studies into reusable Racing Kings opening tree JSON.
  </p>

  <div id="inputs"></div>

  <div class="buttons">
    <button id="addBtn">Add Study</button>
    <button id="convertBtn">Convert</button>
    <button id="copyBtn">Copy JSON</button>
    <button id="saveBtn">Save JSON</button>
  </div>

  <textarea id="output" placeholder="Generated JSON appears here..."></textarea>

</div>

<script src="app.js"></script>

</body>
</html>
