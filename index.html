<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Racing Kings Study Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Racing Kings Study Converter</h1>

    <p class="subtitle">
      Convert Lichess studies into reusable Racing Kings opening tree JSON.
    </p>

    <div id="inputs"></div>

    <div class="buttons">
      <button id="addBtn" type="button">Add Study</button>
      <button id="convertBtn" type="button">Convert</button>
      <button id="copyBtn" type="button">Copy JSON</button>
      <button id="saveBtn" type="button">Save JSON</button>
    </div>

    <p id="status" class="status" aria-live="polite"></p>
    <textarea id="output" placeholder="Generated JSON appears here..."></textarea>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
